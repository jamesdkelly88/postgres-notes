site_name: PostgreSQL Notes
site_url: https://jamesdkelly88.github.io/postgres-notes
copyright: Copyright &copy; 2026 James Kelly
extra:
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/jamesdkelly88
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/jamesdkelly88
plugins:
  - search
  - tags
repo_url: https://github.com/jamesdkelly88/postgres-notes
theme:
  name: material
  favicon: images/favicon.png
  features:
    - navigation.footer
  icon: 
    logo: simple/postgresql
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
